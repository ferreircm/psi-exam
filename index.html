<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSI Louisiana Life Insurance Exam</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 12px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
        h1 { font-size: 20px; font-weight: 500; }
        .timer { font-size: 18px; font-weight: 600; padding: 10px 16px; border-radius: 8px; background: #f0f0f0; }
        .timer.warning { background: #fee; color: #d32f2f; }
        .progress-bar { background: #e0e0e0; height: 4px; border-radius: 2px; margin-bottom: 1.5rem; overflow: hidden; }
        .progress-fill { background: #1976d2; height: 100%; transition: width 0.3s; }
        .question { margin-bottom: 2rem; }
        .question h3 { font-size: 16px; font-weight: 500; margin-bottom: 1.5rem; line-height: 1.6; }
        .question-topic { font-size: 12px; color: #999; margin-bottom: 0.5rem; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option { display: flex; align-items: center; padding: 12px; border: 1px solid #d0d0d0; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .option:hover { background: #f5f5f5; }
        .option.selected { border: 2px solid #1976d2; background: #e3f2fd; }
        .option input { margin-right: 12px; cursor: pointer; }
        .option label { cursor: pointer; flex: 1; font-size: 14px; }
        .feedback { padding: 1rem; border-radius: 8px; margin-bottom: 2rem; border-left: 4px solid; }
        .feedback.correct { background: #f1f8e9; border-left-color: #4caf50; color: #2e7d32; }
        .feedback.incorrect { background: #ffebee; border-left-color: #f44336; color: #c62828; }
        .buttons { display: flex; gap: 12px; margin-bottom: 1rem; }
        .btn { flex: 1; padding: 12px; border: 1px solid #d0d0d0; border-radius: 8px; cursor: pointer; font-size: 14px; background: white; transition: all 0.2s; }
        .btn:hover:not(:disabled) { background: #f5f5f5; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: #1976d2; color: white; border-color: #1976d2; }
        .btn-primary:hover:not(:disabled) { background: #1565c0; }
        .btn-primary:disabled { background: #ccc; }
        .status { font-size: 12px; color: #999; text-align: center; margin-top: 1rem; }
        .results { text-align: center; }
        .score { font-size: 48px; font-weight: 600; margin: 1rem 0; }
        .score.pass { color: #4caf50; }
        .score.fail { color: #f44336; }
        .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 2rem 0; }
        .summary-card { background: #f5f5f5; padding: 1rem; border-radius: 8px; text-align: center; }
        .summary-card-value { font-size: 24px; font-weight: 600; margin: 0.5rem 0; }
        .summary-card-label { font-size: 12px; color: #999; }
        .meta { font-size: 13px; color: #999; display: flex; gap: 2rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container" id="app"></div>

    <script>
        // Question bank with REALISTIC distractors
        const questionBank = {
            louisiana: [ // 10 questions
                { q: "In Louisiana, who regulates insurance agents?", opts: ["National Association of Insurance Commissioners", "Louisiana Department of Insurance", "State Commissioner of Financial Services", "Louisiana State Bar Association"], ans: 1, exp: "The Louisiana Department of Insurance (LDI) regulates insurance licensing, practices, and compliance in the state." },
                { q: "What is the contestable period in Louisiana life insurance?", opts: ["12 months from policy issue", "2 years from policy issue", "3 years from policy issue", "5 years from policy issue"], ans: 1, exp: "Louisiana law allows insurers a 2-year incontestability period to contest policy claims based on misstatements." },
                { q: "In Louisiana, how long is the reinstatement period for a lapsed policy?", opts: ["3 years from lapse date", "5 years from lapse date", "10 years from lapse date", "Indefinite with medical exam"], ans: 1, exp: "Louisiana generally allows reinstatement of lapsed policies within 5 years from the lapse date." },
                { q: "In Louisiana, what is required before an agent can solicit insurance?", opts: ["A passing exam score", "A valid Louisiana insurance license", "Appointment as a company representative", "Completion of approved training"], ans: 1, exp: "An agent must obtain and maintain a valid Louisiana insurance license before engaging in any insurance solicitation or sale." },
                { q: "What is an agent's fiduciary duty in Louisiana?", opts: ["To maximize company profits", "To act in the client's best interest", "To sell the highest commission product", "To ensure regulatory compliance"], ans: 1, exp: "Agents in Louisiana have a fiduciary duty to act in the best interest of their clients." },
                { q: "Which practice is prohibited for Louisiana insurance agents?", opts: ["Providing product illustrations", "Recommending policy comparisons", "All unfair, deceptive, and discriminatory practices", "Documenting client interactions"], ans: 2, exp: "Louisiana law prohibits all unfair, deceptive, or discriminatory practices in insurance sales and servicing." },
                { q: "When must a Louisiana agent disclose material conflicts of interest?", opts: ["Only upon client request", "After the sale is completed", "Before or at time of transaction", "Within 30 days of the sale"], ans: 2, exp: "Louisiana law requires agents to disclose material conflicts of interest before or at the time of the transaction." },
                { q: "What is required when an agent replaces an existing policy?", opts: ["Verbal explanation of differences", "Written notice comparing old and new policies", "Client signature only", "Insurer notification only"], ans: 1, exp: "Replacement requires written notice to the consumer explaining the differences and reasons for replacing the existing policy." },
                { q: "For policy illustrations in Louisiana, what must be shown?", opts: ["Only projected values", "Only guaranteed values", "Both guaranteed and projected values clearly labeled", "Agent recommendations only"], ans: 2, exp: "Illustrations must clearly show guaranteed minimum values and realistic non-guaranteed projections so consumers understand outcomes." },
                { q: "How must an agent handle client complaints in Louisiana?", opts: ["Attempt resolution independently", "Forward to insurer only", "Forward to insurer and Louisiana Department of Insurance", "Wait 30 days before reporting"], ans: 2, exp: "Agents must report consumer complaints to both their insurer and the Louisiana Department of Insurance." }
            ],
            licensing: [ // 2 questions
                { q: "What must occur before a life insurance policy is delivered in Louisiana?", opts: ["Payment of first premium only", "Buyer receives illustration and free look notice", "Underwriting approval", "Medical exam completion"], ans: 1, exp: "Before delivery, the buyer must receive the illustration, free look notice, and any required consumer guides." },
                { q: "What records must Louisiana insurance agents maintain?", opts: ["Sales records only", "Detailed records of all client interactions and transactions", "Annual summary reports", "Compliance certificates"], ans: 1, exp: "Agents must maintain detailed records of applications, illustrations, replacements, and client interactions for compliance." }
            ],
            general: [ // 14 questions
                { q: "What is life insurance fundamentally designed to do?", opts: ["Generate tax-free investment returns", "Provide financial security to beneficiaries upon death", "Replace earned income during retirement", "Fund estate taxes exclusively"], ans: 1, exp: "Life insurance's main purpose is to provide financial security to beneficiaries when the insured passes away." },
                { q: "What does 'insurable interest' legally require?", opts: ["The policyholder owns the insured's property", "The policyholder would suffer financial hardship from the insured's death", "The policyholder is a beneficiary", "The policyholder is related to the insured"], ans: 1, exp: "Insurable interest means the policyholder would suffer actual financial hardship from the insured's death." },
                { q: "Which scenario best describes adverse selection?", opts: ["Applicants choosing coverage amounts incorrectly", "High-risk individuals disproportionately purchasing insurance", "Agents selecting unsuitable policies", "Insurers rejecting low-risk applicants"], ans: 1, exp: "Adverse selection occurs when people with higher risk (poor health) disproportionately purchase insurance, increasing company losses." },
                { q: "What is 'moral hazard' in insurance contracts?", opts: ["Ethical concerns about premium pricing", "The insured potentially acting dishonestly to profit from insurance", "Insurer discrimination against applicants", "Agent misconduct in sales"], ans: 1, exp: "Moral hazard is the risk that an insured might behave dishonestly or fraudulently to profit from insurance proceeds." },
                { q: "Why is income replacement coverage important?", opts: ["To eliminate all financial obligations", "To preserve family's standard of living if earner dies", "To provide tax deductions", "To build investment wealth"], ans: 1, exp: "Income replacement insurance ensures the family can maintain their standard of living if the primary earner dies." },
                { q: "What is the primary purpose of a needs analysis?", opts: ["To determine premium pricing", "To assess an individual's insurance requirements", "To evaluate company profitability", "To calculate commission amounts"], ans: 1, exp: "Needs analysis evaluates a client's financial goals, obligations, and risks to determine appropriate coverage amount." },
                { q: "What risk does policy duplication create?", opts: ["Policy overlap ensuring maximum protection", "Excessive insurance beyond actual financial need", "Reduced premium costs", "Enhanced beneficiary options"], ans: 1, exp: "Duplication occurs when total coverage exceeds actual insurable interest, creating unnecessary expense and fraud risk." },
                { q: "How does underinsurance impact beneficiaries?", opts: ["They receive maximum tax benefits", "They are inadequately protected financially", "They must contribute to premiums", "They can access policy loans"], ans: 1, exp: "Underinsurance leaves the family inadequately protected if the insured dies, failing to meet financial obligations." },
                { q: "What is the primary goal of suitability analysis?", opts: ["Maximize agent commissions", "Ensure recommendations match client's situation", "Streamline underwriting", "Reduce claims payout"], ans: 1, exp: "Suitability review ensures the recommended product matches the client's financial situation, needs, and objectives." },
                { q: "How is 'twisting' defined in insurance?", opts: ["Confusing policy language deliberately", "Unethically inducing replacement through misrepresentation", "Calculating premium increases", "Denying coverage based on misstatements"], ans: 1, exp: "Twisting is unethical inducement of policy replacement through misleading statements, harming the consumer." },
                { q: "What distinguishes 'churning' from normal policy replacement?", opts: ["Annual policy reviews", "Repeated unnecessary replacements for personal gain", "Client-requested changes", "Standard underwriting practices"], ans: 1, exp: "Churning is recommending unnecessary policy replacements repeatedly to generate commissions, harming the customer." },
                { q: "What duty do insurers owe applicants?", opts: ["To approve all applications", "To maintain good faith and fair dealing", "To provide financial advice", "To waive underwriting requirements"], ans: 1, exp: "Insurers have a duty of good faith and fair dealing to treat applicants fairly, avoid unfair practices, and handle claims promptly." },
                { q: "What constitutes 'unfair discrimination' in life insurance?", opts: ["Appropriate risk classification", "Using non-actuarial factors for rate differences", "Standard health underwriting", "Premium adjustments for age"], ans: 1, exp: "Unfair discrimination uses factors (race, religion, national origin) not actuarially justified, which is prohibited." },
                { q: "What is required for 'fair disclosure' to clients?", opts: ["General product information only", "Complete, honest information on material facts", "Disclosure of agent compensation", "Recommendations without alternatives"], ans: 1, exp: "Fair and accurate disclosure requires providing complete, honest, and clear information about all material policy features." }
            ],
            basics: [ // 16 questions
                { q: "Which characteristic distinguishes term life insurance?", opts: ["Builds cash surrender value", "Provides coverage for a specified period", "Guarantees lifetime coverage", "Includes investment options"], ans: 1, exp: "Term life insurance covers the insured for a specific period (10, 20, 30 years, etc.), after which coverage ends unless renewed." },
                { q: "How is a beneficiary defined in insurance?", opts: ["The insurance agent", "The person receiving policy proceeds", "The policy underwriter", "The insurance company"], ans: 1, exp: "A beneficiary is the person (or entity) designated to receive the death benefit proceeds." },
                { q: "What does the free look period allow?", opts: ["Renewal without medical exam", "Review and cancellation with full refund", "Modification of coverage terms", "Extension of policy term"], ans: 1, exp: "The free look period (typically 10-30 days) allows policyholders to review the policy and cancel it for a full refund if dissatisfied." },
                { q: "Which policy provision allows loans against cash value?", opts: ["Grace period provision", "Policy loan provision", "Surrender clause", "Waiver of premium"], ans: 1, exp: "The policy loan provision permits policyholders to borrow against the cash value of their policy." },
                { q: "What is the primary purpose of the grace period?", opts: ["Extend coverage permanently", "Allow premium payment within a specific timeframe", "Provide dividend benefits", "Process claims faster"], ans: 1, exp: "The grace period (typically 30-31 days) allows the policyholder to pay overdue premiums without the policy lapsing." },
                { q: "When does the suicide clause typically apply?", opts: ["After policy anniversary", "During the contestable period", "Anytime during coverage", "Only at policy surrender"], ans: 1, exp: "The suicide clause protects the insurer by denying the death benefit (or returning premiums) if suicide occurs within the contestable period (typically 2 years)." },
                { q: "What triggers death benefit payout?", opts: ["Policy reaching maturity", "Verified proof of death", "Annual policy renewal", "Beneficiary filing claim"], ans: 1, exp: "The death benefit is paid upon verified proof of the insured's death, typically requiring a death certificate." },
                { q: "What constitutes a 'lapsed' policy?", opts: ["Paid-off policy status", "Termination due to non-payment", "Suspended coverage temporarily", "Cancelled by insurer"], ans: 1, exp: "A lapsed policy is one that has terminated because premiums were not paid within the grace period." },
                { q: "Can lapsed policies be reinstated?", opts: ["Never under any circumstances", "Within specified period with evidence of insurability", "Automatically without requirements", "Only by paying full balance"], ans: 1, exp: "Lapsed policies can generally be reinstated within 5 years if the insured provides evidence of insurability and pays back premiums." },
                { q: "What are nonforfeiture options?", opts: ["Penalties for policy cancellation", "Choices for disposing of cash value", "Required premium payments", "Beneficiary designation options"], ans: 1, exp: "Nonforfeiture options include paid-up insurance or extended term, allowing the policyholder to preserve some value if premiums stop." },
                { q: "How is a rider defined?", opts: ["A dependent covered under policy", "Optional modification to coverage", "Policy holder designation", "Underwriting review"], ans: 1, exp: "A rider is an optional endorsement that adds, excludes, or modifies coverage in the base policy." },
                { q: "What does the incontestability clause protect?", opts: ["Prevents all claim denials", "Limits contestation after specified period", "Eliminates premium payments", "Guarantees beneficiary payout"], ans: 1, exp: "The incontestability clause states that after a set period (usually 2 years), the insurer cannot contest the validity of the policy." },
                { q: "What is a waiver of premium rider?", opts: ["Reduces death benefit if disabled", "Waives premiums during disability", "Eliminates policy during illness", "Reduces cash value"], ans: 1, exp: "Waiver of Premium rider waives policy premiums if the insured becomes totally disabled, keeping coverage in force." },
                { q: "What does 'material misstatement' mean in underwriting?", opts: ["Minor clerical errors", "False statements affecting underwriting decision", "Estimated health information", "Late premium payments"], ans: 1, exp: "Material misstatement is a false statement that the insurer relied upon when issuing the policy and affects the risk." },
                { q: "How does an irrevocable beneficiary differ from revocable?", opts: ["Cannot be changed without consent", "Receives larger benefit amount", "Must be a family member", "Requires annual approval"], ans: 1, exp: "An irrevocable beneficiary has rights to the policy and cannot be changed without their written consent." },
                { q: "How is death benefit taxed for beneficiaries?", opts: ["Always taxable as income", "Generally not taxable income", "Partially taxable", "Subject to state taxes only"], ans: 1, exp: "Death benefits are generally NOT taxable income to beneficiaries, providing a key tax advantage of life insurance." }
            ],
            types: [ // 17 questions
                { q: "How does whole life differ from term life?", opts: ["Term is temporary; whole life is permanent with cash value", "Whole life has lower premiums", "Term builds investment returns", "Whole life provides temporary coverage"], ans: 0, exp: "Whole life provides lifelong coverage and builds cash value, while term is temporary coverage with no savings component." },
                { q: "What is cash value in permanent life insurance?", opts: ["Guaranteed annual benefit", "Accumulated savings portion", "Death benefit amount", "Commission paid to agent"], ans: 1, exp: "Cash value is the savings portion of permanent policies (Whole, Universal) that builds over time and can be borrowed against." },
                { q: "How is a 'level term' policy structured?", opts: ["Increasing death benefit over time", "Fixed premium and benefit throughout term", "Variable premium amounts", "Decreasing coverage annually"], ans: 1, exp: "Level term maintains the same death benefit and premium throughout the entire term period." },
                { q: "When is 'decreasing term' typically used?", opts: ["Building retirement savings", "Mortgage or debt protection", "Maximizing investment returns", "Long-term wealth accumulation"], ans: 1, exp: "Decreasing term policies have benefits that reduce over time, often used for mortgage or debt protection." },
                { q: "What is the benefit of 'increasing term' coverage?", opts: ["Lower initial premiums", "Protection against inflation", "Faster cash accumulation", "Premium stability"], ans: 1, exp: "Increasing term allows death benefits to grow over time, protecting against inflation." },
                { q: "What is the primary advantage of term life insurance?", opts: ["Builds cash value quickly", "Lower premiums than permanent", "Lifetime coverage guaranteed", "Investment growth potential"], ans: 1, exp: "Term life offers lower premiums compared to permanent insurance, making it affordable for those with temporary needs." },
                { q: "What is a limitation of term life insurance?", opts: ["Excessive cost", "Coverage ends without renewal options", "High commission costs", "Restricted beneficiaries"], ans: 1, exp: "Term insurance expires after the term ends, requiring new application (and medical underwriting) to continue coverage." },
                { q: "What does 'guaranteed renewable' mean?", opts: ["Insurer may decline renewal", "Insurer must renew without medical exam", "Premiums remain fixed", "Automatic lifetime renewal"], ans: 1, exp: "Guaranteed renewable means the insurer must renew the policy at expiration without requiring new underwriting, though premiums may increase." },
                { q: "What is a 'convertible term' feature?", opts: ["Cannot modify coverage", "Can convert to permanent without medical exam", "Must convert before expiration", "Converts to annuity automatically"], ans: 1, exp: "Convertible term allows policyholders to convert to permanent coverage without evidence of insurability within the conversion period." },
                { q: "What is 'return of premium' term insurance?", opts: ["Refunds unpaid claims", "Returns premiums if policy outlives term", "Premium reduction benefit", "Death benefit refund"], ans: 1, exp: "Return of premium term (ROP) refunds all or a portion of paid premiums if the policyholder outlives the term." },
                { q: "How does universal life differ from whole life?", opts: ["UL has flexible premiums and adjustable benefits", "Whole life allows investment options", "UL guarantees lifetime coverage only", "Whole life has no cash value"], ans: 0, exp: "Universal Life (UL) offers flexible premiums and death benefits, with the difference between premiums and costs building cash value." },
                { q: "What characterizes universal life premiums?", opts: ["Fixed for entire life", "Flexible within specified limits", "Determined by company annually", "Based on account value only"], ans: 1, exp: "Universal Life (UL) allows flexible premiums that can be adjusted, as long as the policy has enough cash value to cover costs." },
                { q: "How does variable universal life function?", opts: ["Fixed returns like whole life", "Investment options with variable returns", "Guaranteed income payment", "Fixed premium only"], ans: 1, exp: "Variable Universal Life (VUL) combines UL's flexible premiums with investment options, so returns depend on market performance." },
                { q: "What is 'modified whole life'?", opts: ["Standard whole life coverage", "Lower early premiums, higher later premiums", "Modified death benefit", "Temporary coverage type"], ans: 1, exp: "Modified whole life has lower premiums for initial period, then higher premiums for the remaining life of the policy." },
                { q: "How is 'limited pay' life insurance designed?", opts: ["Temporary coverage only", "Premiums paid for period, coverage continues for life", "Payment until retirement", "Optional premium payments"], ans: 1, exp: "Limited pay whole life requires premiums for a set period (20-pay, paid-up at 65) with coverage continuing for life." },
                { q: "What is a 'term-to-permanent conversion' option?", opts: ["Converting to annuity", "Converting term to permanent without exam", "Modifying term length", "Extending coverage period"], ans: 1, exp: "Many term policies include conversion rights allowing policyholders to convert to permanent coverage within a specified period without proof of insurability." },
                { q: "How does 'annual renewable term' work?", opts: ["One-time coverage payment", "Renews yearly with increasing premiums", "Fixed premium always", "Coverage ends annually"], ans: 1, exp: "Annual Renewable Term (ART) can be renewed each year, with premiums increasing each year as the insured ages." }
            ],
            provisions: [ // 26 questions
                { q: "What does an accidental death benefit rider provide?", opts: ["Covers natural death only", "Additional benefit if death from accident", "Medical expense coverage", "Disability income"], ans: 1, exp: "Accidental Death Benefit (ADB) rider pays an additional benefit if death results from accidental injury." },
                { q: "What is a surrender charge?", opts: ["Annual policy maintenance fee", "Fee if surrendered early", "Premium adjustment charge", "Beneficiary processing fee"], ans: 1, exp: "Surrender charge is a fee imposed if the policyholder surrenders (cancels) a permanent policy during early years." },
                { q: "What does 'persistence' measure in insurance?", opts: ["Agent sales performance", "Percentage of policies remaining in force", "Premium payment rates", "Claim frequency"], ans: 1, exp: "Persistence refers to how long policies remain in force, indicating customer satisfaction and policy value." },
                { q: "What death benefit options do policies typically offer?", opts: ["Only fixed death benefit", "Level benefit or benefit plus accumulated value", "Annual adjustments only", "Single payout option"], ans: 1, exp: "Death benefit options allow policyholders to choose between a level death benefit or a level death benefit plus accumulated cash value." },
                { q: "How does 'reentry' term pricing work?", opts: ["Higher premiums always", "Lower rates if health acceptable at renewal", "Fixed rates only", "Increases without exam"], ans: 1, exp: "Reentry term offers lower renewal rates if the insured agrees to pass medical underwriting at renewal." },
                { q: "When is 'survivorship' insurance typically used?", opts: ["Individual income protection", "Estate and tax planning", "Disability coverage", "Retirement funding"], ans: 1, exp: "Survivorship insurance is commonly used in estate planning to pay estate taxes when the survivor of a couple passes away." },
                { q: "What is a 'preferred provider' discount?", opts: ["Automatic discount for all", "Reduced rates for healthy applicants", "Employer group discount", "Annual loyalty discount"], ans: 1, exp: "Preferred provider or preferred risk discounts offer lower rates to applicants with excellent health and minimal risk factors." },
                { q: "How does smoking status affect premiums?", opts: ["No impact on rates", "Higher rates for smokers", "Rates depend on age only", "Optional surcharge only"], ans: 1, exp: "Insurers charge different rates (typically higher for smokers) based on smoking status, which affects mortality risk." },
                { q: "What is 'simplified underwriting'?", opts: ["No health review", "Faster issuance with less medical review for smaller amounts", "Full medical exam required", "Always more expensive"], ans: 1, exp: "Simplified or non-medical underwriting uses medical records and lab work instead of full exams for moderate coverage amounts." },
                { q: "What is the 'face amount' of a policy?", opts: ["Premium amount", "Death benefit amount stated in policy", "Annual cash value", "Total contributions"], ans: 1, exp: "Face amount is the death benefit amount stated in the policy, the principal benefit paid to beneficiaries." },
                { q: "What is 'guaranteed issue' insurance?", opts: ["Medical exam required", "Issued without health exam or questions", "Requires approval process", "Limited availability"], ans: 1, exp: "Guaranteed issue policies are issued without health underwriting, though usually with coverage limits and higher premiums." },
                { q: "What renewal option do policies typically include?", opts: ["Cannot renew", "Right to renew at term end", "Automatic conversion", "Requires reapplication"], ans: 1, exp: "Renewal option gives the policyholder the right to renew coverage at the end of the term period." },
                { q: "How are 'family plan' policies structured?", opts: ["Spouse only", "Multiple family members under one policy", "Children only", "Individual policies bundled"], ans: 1, exp: "Family plan provides coverage for the insured, spouse, and children under one policy for convenience and savings." },
                { q: "What does 'joint life' insurance cover?", opts: ["Individual coverage", "Two people under one policy", "Marital obligation", "Children coverage"], ans: 1, exp: "Joint life covers two insureds under one policy; usually pays at first death (or both, depending on contract)." },
                { q: "What are policy dividends?", opts: ["Annual interest payments", "Policyholder's share of company surplus", "Guaranteed benefits", "Premium reductions only"], ans: 1, exp: "Dividends in participating policies represent the policyholder's share of company surplus, paid or used to reduce premiums." },
                { q: "What is a 'participating' policy?", opts: ["No dividend eligibility", "Eligible for dividend distribution", "Must receive dividends", "Non-profit only"], ans: 1, exp: "Participating policies are eligible to receive dividends from insurance company surplus when profits allow." },
                { q: "How do 'non-participating' policies differ?", opts: ["Receive dividends", "No dividend participation", "Higher premiums", "Lower benefits"], ans: 1, exp: "Non-participating (non-par) policies do not receive dividends and have lower premiums with no profit sharing." },
                { q: "What is a 'conditional receipt'?", opts: ["Payment receipt", "Temporary coverage while application reviewed", "Permanent policy", "Rejection notice"], ans: 1, exp: "Conditional receipt provides temporary coverage from application date while underwriting review is pending." },
                { q: "What are 'accelerated benefits'?", opts: ["Immediate payout", "Access to death benefit while living if conditions met", "Terminal illness only", "Always denied"], ans: 1, exp: "Accelerated benefits allow access to part of the death benefit while living if terminally ill or experiencing specific conditions." },
                { q: "What is 'age-nearest-birthday'?", opts: ["Actual age only", "Age determined by nearest birthday for rating", "Rounded up always", "Underwriter discretion"], ans: 1, exp: "Age-nearest-birthday uses the insured's age as of the nearest birthday for premium calculation purposes." },
                { q: "How does 'paid-up at 65' work?", opts: ["Coverage ends at 65", "Premiums end at 65, coverage continues", "Optional coverage only", "Permanent term only"], ans: 1, exp: "Paid-up at 65 (or other age) requires premium payments until that age, then the policy is fully paid-up (no more premiums needed)." },
                { q: "What is the 'cost of insurance' in UL policies?", opts: ["Annual premium cost", "Monthly charge for death benefit", "Administrative fee", "Investment cost"], ans: 1, exp: "In UL policies, the cost of insurance (COI) is deducted monthly from cash value to cover the actual death benefit cost." },
                { q: "What is the 'interest crediting rate'?", opts: ["Premium rate charged", "Rate at which cash value earns interest", "Annual policy fee", "Loan interest rate"], ans: 1, exp: "The interest crediting rate is the rate at which cash value earns interest, typically based on market indices and company factors." },
                { q: "What is a 'policy anniversary'?", opts: ["Policyholder's birthday", "Annual date policy was issued", "Premium due date", "Coverage end date"], ans: 1, exp: "Policy anniversary is the annual date marking one year from policy issue, used for premium and benefit calculations." },
                { q: "What constitutes a 'policy year'?", opts: ["Calendar year", "12-month period from anniversary to anniversary", "Fiscal year", "Benefit year"], ans: 1, exp: "Policy year runs from policy anniversary to policy anniversary, used for tracking annual charges and benefits." },
                { q: "What is 'premium mode'?", opts: ["Payment method type", "Frequency of premium payments", "Amount calculation", "Policy adjustment"], ans: 1, exp: "Premium mode refers to the frequency of premium payment (annual, semi-annual, quarterly, or monthly)." }
            ],
            annuities: [ // 11 questions
                { q: "How is an annuity fundamentally defined?", opts: ["Life insurance product", "Contract paying periodic income", "Lump sum investment", "Savings account"], ans: 1, exp: "An annuity is a contract where an insurance company pays income to the annuitant based on the contract terms." },
                { q: "What characterizes a 'fixed annuity'?", opts: ["Variable payment amounts", "Guaranteed fixed payment amount", "Market-dependent returns", "Optional payments"], ans: 1, exp: "Fixed annuities guarantee a specific payment amount regardless of market conditions, providing stable income." },
                { q: "How do variable annuities function?", opts: ["Fixed payment guarantees", "Payments vary based on investment performance", "Guaranteed return", "Insurance only"], ans: 1, exp: "Variable annuities allow the annuitant to choose investment options, with payments varying based on investment performance." },
                { q: "When do immediate annuities begin payments?", opts: ["Delayed several years", "Shortly after purchase", "At retirement age", "Upon claim"], ans: 1, exp: "Immediate annuities begin making payments to the annuitant within a short period after purchase, often within 30 days." },
                { q: "What is the key feature of deferred annuities?", opts: ["Payments start immediately", "Accumulation period before income begins", "Starts immediately", "Never provides income"], ans: 1, exp: "Deferred annuities have an accumulation period where funds grow, then begin income payments at a later date." },
                { q: "How does 'joint and survivor' annuity payout work?", opts: ["Individual only", "Income continues to survivor after death", "Ends at death", "Reduced survivor payment"], ans: 1, exp: "Joint and survivor annuities continue paying income to the surviving spouse after the original annuitant passes away." },
                { q: "What are index annuities based on?", opts: ["Fixed company rate", "Performance of market indices", "Guaranteed returns", "Fixed income"], ans: 1, exp: "Index (or equity-indexed) annuities offer returns based on performance of stock market indices like the S&P 500." },
                { q: "What is a 'cap' in index annuities?", opts: ["Minimum guarantee", "Maximum rate of return credited", "No limit on returns", "Floor protection"], ans: 1, exp: "Cap is the maximum interest rate the insurance company credits in index annuities, even if index performs better." },
                { q: "What is the 'floor' in index annuities?", opts: ["Variable rate", "Minimum interest rate guaranteed", "No minimum", "Market-based"], ans: 1, exp: "Floor is the guaranteed minimum interest rate credited, protecting the annuitant if the index performs poorly." },
                { q: "What is 'participation rate' in index annuities?", opts: ["Minimum participation", "Percentage of index gains credited", "Full gains participation", "No participation"], ans: 1, exp: "Participation rate is the percentage of the index's positive returns that are credited to the annuitant's contract." },
                { q: "What are surrender charges in annuities?", opts: ["Annual maintenance fees", "Fees for withdrawing funds during surrender period", "Death benefits", "No penalty"], ans: 1, exp: "Surrender charges are fees imposed if annuitants withdraw more than allowed during the surrender period (typically 7-10 years)." }
            ],
            tax: [ // 8 questions
                { q: "What is a 'contestable claim'?", opts: ["Beneficiary dispute only", "Claim insurer can challenge within contestability period", "Always honored", "Fraudulent only"], ans: 1, exp: "A contestable claim is one the insurer can challenge within the contestability period (usually 2 years) based on material misstatements." },
                { q: "What causes 'Modified Endowment Contract' (MEC) status?", opts: ["Annual review", "Excessive premiums relative to death benefit", "Policy age", "Beneficiary change"], ans: 1, exp: "A MEC results from paying premiums beyond the 7-pay test limit, affecting tax treatment of loans and withdrawals." },
                { q: "What are the tax consequences of MEC status?", opts: ["No consequences", "Loans and withdrawals taxed as income first", "Tax-free distributions", "Premium deduction"], ans: 1, exp: "In MEC status, loans and withdrawals are taxed as ordinary income (LIFO method) and may incur 10% penalty if before age 59½." },
                { q: "What is the 'corridor' requirement in variable policies?", opts: ["Coverage area", "Minimum death benefit to cash value relationship", "Policy review period", "Surrender period"], ans: 1, exp: "The corridor is the minimum required spread between death benefit and cash value to maintain policy tax status." },
                { q: "How does an 'irrevocable life insurance trust' function?", opts: ["Regular family trust", "Trust owns policy with proceeds outside estate", "Temporary arrangement", "Revocable option"], ans: 1, exp: "An ILIT owns and is beneficiary of policies; proceeds pass to beneficiaries tax-free outside the insured's taxable estate." },
                { q: "What is 'estate equalization' used for?", opts: ["Equal premium payments", "Equalizing inheritance when some heirs get illiquid assets", "Tax reduction only", "Benefit distribution"], ans: 1, exp: "Estate equalization uses insurance to ensure equal distribution when some heirs receive illiquid business assets." },
                { q: "What is 'second-to-die' insurance coverage?", opts: ["Spouse protection only", "Insurance on two people paying at second death", "Term insurance", "Individual policy"], ans: 1, exp: "Second-to-die (survivorship) insures two people and pays the death benefit when the second person dies." },
                { q: "What benefit does a 'long-term care rider' provide?", opts: ["Mobility assistance", "Access to death benefit for long-term care needs", "Medical only", "Terminal illness"], ans: 1, exp: "A long-term care rider allows access to the death benefit while living if the insured needs nursing care or assistance." }
            ]
        };

        let examQuestions = [];
        let currentIndex = 0;
        let answers = [];
        let submitted = false;
        let showResults = false;
        let timeLeft = 7200;
        let examStarted = false;
        let timerInterval = null;

        function generateNewExam() {
            // Target distribution
            const distribution = {
                louisiana: 10,
                licensing: 2,
                general: 14,
                basics: 16,
                types: 17,
                provisions: 26,
                annuities: 11,
                tax: 8
            };

            examQuestions = [];

            // Select questions from each topic maintaining distribution
            for (const [topic, count] of Object.entries(distribution)) {
                const questions = questionBank[topic];
                const shuffled = [...questions].sort(() => Math.random() - 0.5);
                const selected = shuffled.slice(0, count);
                examQuestions.push(...selected.map(q => ({ ...q, topic })));
            }

            // Shuffle all questions
            examQuestions = examQuestions.sort(() => Math.random() - 0.5);
            currentIndex = 0;
            answers = new Array(examQuestions.length).fill(null);
            submitted = false;
            showResults = false;
            timeLeft = 7200;
            examStarted = true;
            startTimer();
            render();
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    autoSubmit();
                }
                render();
            }, 1000);
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function handleAnswer(idx) {
            answers[currentIndex] = idx;
            render();
        }

        function handleNext() {
            if (currentIndex < examQuestions.length - 1) {
                currentIndex++;
                render();
            }
        }

        function handlePrev() {
            if (currentIndex > 0) {
                currentIndex--;
                render();
            }
        }

        function handleSubmit() {
            if (answers.some(a => a === null)) return;
            submitted = true;
            showResults = true;
            clearInterval(timerInterval);
            render();
        }

        function autoSubmit() {
            if (!showResults) {
                submitted = true;
                showResults = true;
                render();
            }
        }

        function calculateScore() {
            let correct = 0;
            for (let i = 0; i < examQuestions.length; i++) {
                if (answers[i] === examQuestions[i].ans) correct++;
            }
            return correct;
        }

        function render() {
            const app = document.getElementById('app');
            
            if (examQuestions.length === 0) {
                app.innerHTML = '<p>Loading exam...</p>';
                return;
            }

            if (showResults) {
                const score = calculateScore();
                const percentage = Math.round((score / 100) * 100);
                const passing = percentage >= 70;
                const timeUsed = 7200 - timeLeft;

                app.innerHTML = `
                    <div class="results">
                        <h2>Exam Results</h2>
                        <div class="score ${passing ? 'pass' : 'fail'}">${score}/100</div>
                        <div style="font-size: 28px; font-weight: 600;">${percentage}%</div>
                        <p>${passing ? '✓ Passing Score' : '✗ Below Passing'}</p>
                        <p>${passing ? 'Excellent work! You are ready for the PSI exam.' : 'Review the topics and try again.'}</p>
                        
                        <div class="summary">
                            <div class="summary-card">
                                <div class="summary-card-label">Correct</div>
                                <div class="summary-card-value" style="color: #4caf50;">${score}</div>
                            </div>
                            <div class="summary-card">
                                <div class="summary-card-label">Incorrect</div>
                                <div class="summary-card-value" style="color: #f44336;">${100 - score}</div>
                            </div>
                        </div>
                        
                        <p style="font-size: 13px; color: #999; margin: 1rem 0;">Time used: ${formatTime(timeUsed)}</p>
                        
                        <button class="btn btn-primary" onclick="location.reload()">Take New Exam</button>
                    </div>
                `;
                return;
            }

            const q = examQuestions[currentIndex];
            const timeWarning = timeLeft <= 300;

            let html = `
                <div class="header">
                    <h1>PSI Life Insurance Exam</h1>
                    <div class="timer ${timeWarning ? 'warning' : ''}">
                        ${formatTime(timeLeft)}
                    </div>
                </div>
                
                <div class="meta">
                    <span>Question ${currentIndex + 1}/100</span>
                    <span>${q.topic.replace(/([A-Z])/g, ' $1').trim()}</span>
                </div>
                
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${((currentIndex + 1) / 100) * 100}%"></div>
                </div>
                
                <div class="question">
                    <h3>${q.q}</h3>
                    <div class="options">
                        ${q.opts.map((opt, idx) => `
                            <label class="option ${answers[currentIndex] === idx ? 'selected' : ''}">
                                <input type="radio" name="answer" ${answers[currentIndex] === idx ? 'checked' : ''} 
                                       onchange="handleAnswer(${idx})">
                                <label>${opt}</label>
                            </label>
                        `).join('')}
                    </div>
                </div>
                
                ${submitted ? `
                    <div class="feedback ${answers[currentIndex] === q.ans ? 'correct' : 'incorrect'}">
                        <strong>${answers[currentIndex] === q.ans ? '✓ Correct' : '✗ Incorrect'}</strong>
                        <p>${q.exp}</p>
                        ${answers[currentIndex] !== q.ans ? `<p><strong>Correct answer:</strong> ${q.opts[q.ans]}</p>` : ''}
                    </div>
                ` : ''}
                
                <div class="buttons">
                    <button class="btn" ${currentIndex === 0 ? 'disabled' : ''} onclick="handlePrev()">← Previous</button>
                    <button class="btn" ${currentIndex === 99 ? 'disabled' : ''} onclick="handleNext()">Next →</button>
                </div>
                
                <div class="buttons">
                    <button class="btn" onclick="submitted = !submitted; render();">
                        ${submitted ? 'Hide Feedback' : 'Show Feedback'}
                    </button>
                    <button class="btn btn-primary" ${answers.some(a => a === null) ? 'disabled' : ''} 
                            onclick="handleSubmit()">Submit Exam</button>
                </div>
                
                <div class="status">
                    ${answers.filter(a => a !== null).length} of 100 answered
                </div>
            `;

            app.innerHTML = html;
        }

        generateNewExam();
    </script>
</body>
</html>
